app = "batchtools"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  HOST = "0.0.0.0"
  DATA_DIR = "/data"
  # PUBLIC_HOST 由 secret 注入（避免硬编码到 git）

[[mounts]]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 400

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 2048

# Secrets (一次性设置)：
#   fly secrets set \
#     INITIAL_ADMIN_USERNAME=admin \
#     INITIAL_ADMIN_PASSWORD=... \
#     MASTER_KEY=$(openssl rand -hex 32) \
#     PUBLIC_HOST=https://batchtools.fly.dev \
#     DASHSCOPE_ACCOUNTS_YAML="$(cat accounts.yaml)"
