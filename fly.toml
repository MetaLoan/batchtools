# fly.toml — replace `app` and run `fly launch --copy-config` if you want.
app = "batch-video-promoter"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  HOST = "0.0.0.0"
  DATA_DIR = "/data"
  # PUBLIC_HOST should match your app URL once known:
  # PUBLIC_HOST = "https://batch-video-promoter.fly.dev"

[[mounts]]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 400

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

# Set secrets via:
#   fly secrets set APP_PASSWORD=...  MASTER_KEY=...  PUBLIC_HOST=https://<your-app>.fly.dev
