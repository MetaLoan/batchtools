name: Deploy to Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'web/**'
      - 'shared/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'fly.toml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/fly-deploy.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'manual trigger'

concurrency:
  group: fly-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Fly.io (remote build)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Show machine status
        if: always()
        run: flyctl status --app batchtools || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
